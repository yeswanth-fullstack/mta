{% extends 'base.html' %} {% block content %}
<div class="p-3">
  <div class="container">
    <div class="row mt-3">
      <div class="col mx-auto mb-3">
        <h2>WORK QUEUE LISTING</h2>
        <hr />
        <h3>{{ template_data.title }}</h3>
        <table class="mt-3 table table-bordered">
          <thead>
            <tr>
              {% for header in template_data.data.0.keys %}
              <th scope="col">{{ header }}</th>
              {% endfor %}
            </tr>
          </thead>
          <tbody>
            {% for row in template_data.data %}
            <tr
              class="{% if row.openclose == 'Open' %} table-success {% else %} table-danger {% endif %}"
            >
              {% for value in row.values %}
              <td scope="row">{{value}}</td>
              {% endfor %}
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
